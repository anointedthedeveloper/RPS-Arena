<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPS Arena</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="container">
    <h1><i class="fa-solid fa-shield-halved"></i> RPS Arena</h1>
    <p class="subtitle">Best of 5 — First to 3 wins!</p>

    <div class="mode-selector">
      <button class="mode-btn active" data-mode="easy"><i class="fa-solid fa-face-smile"></i> Easy</button>
      <button class="mode-btn" data-mode="hard"><i class="fa-solid fa-skull"></i> Hard</button>
    </div>

    <div class="scoreboard">
      <div class="score-box">
        <span class="score-label">You</span>
        <span class="score-value" id="playerScore">0</span>
      </div>
      <div class="score-box draws">
        <span class="score-label">Draws</span>
        <span class="score-value" id="draws">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">CPU</span>
        <span class="score-value" id="computerScore">0</span>
      </div>
    </div>

    <div class="choices">
      <button class="choice-btn" data-choice="rock"><i class="fa-solid fa-hand-back-fist"></i><span>Rock</span></button>
      <button class="choice-btn" data-choice="paper"><i class="fa-solid fa-hand"></i><span>Paper</span></button>
      <button class="choice-btn" data-choice="scissors"><i class="fa-solid fa-hand-scissors"></i><span>Scissors</span></button>
    </div>

    <div class="result-area">
      <div class="picks">
        <div class="pick">
          <div class="pick-icon" id="playerPick"><i class="fa-solid fa-question"></i></div>
          <div class="pick-label">You</div>
        </div>
        <div class="vs">VS</div>
        <div class="pick">
          <div class="pick-icon" id="computerPick"><i class="fa-solid fa-question"></i></div>
          <div class="pick-label">CPU</div>
        </div>
      </div>
      <div class="result-text" id="resultText">Make your move!</div>
    </div>

    <button class="reset-btn" id="resetBtn"><i class="fa-solid fa-rotate-right"></i> Reset Game</button>
  </div>

  <footer>Developed by <strong>anointedthedeveloper</strong></footer>

  <script src="script.js"></script>
</body>
</html>
